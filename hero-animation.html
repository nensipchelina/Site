<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Animation — NPchelina preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#1A1410;font-family:'DM Sans',sans-serif;overflow:hidden;}

.hero{position:relative;width:100vw;height:100vh;overflow:hidden;}

/* ─── Hero text ─── */
#hero-text{
  position:absolute;left:8%;top:50%;
  transform:translateY(-50%);
  z-index:10;pointer-events:none;
}
.htag{
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:#C4A882;margin-bottom:.9rem;
  display:flex;align-items:center;gap:1rem;
}
.htag::before{content:'';display:block;width:36px;height:1px;background:#C4A882;}
.hname{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.5rem,7.5vw,8rem);
  font-weight:300;line-height:.9;letter-spacing:-.02em;color:#F0EAE0;
  margin-bottom:.8rem;
}
.hname em{font-style:italic;color:#C4A882;}
.hsub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A09080;font-weight:300;}

/* ─── CTA Button ─── */
#hero-btn{
  position:absolute;left:8%;top:72%;
  transform:translateY(-50%);
  display:inline-flex;align-items:center;gap:.6rem;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;
  background:#C4A882;color:#1A1410;
  border:none;padding:.85rem 1.8rem;
  cursor:pointer;text-decoration:none;z-index:10;
}

/* ─── SVG stage ─── */
#anim-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}

/* ─── Replay ─── */
#replay-btn{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:rgba(196,168,130,.12);border:1px solid rgba(196,168,130,.25);
  color:#C4A882;font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  padding:.55rem 1.1rem;cursor:pointer;z-index:200;
  transition:background .3s;
}
#replay-btn:hover{background:rgba(196,168,130,.22);}
#stage-label{
  position:fixed;bottom:1.5rem;left:1.5rem;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(196,168,130,.35);font-family:'DM Sans',sans-serif;
  z-index:200;
}
</style>
</head>

<button id="replay-btn">↺ Повтор анимации</button>
<div id="stage-label">загрузка…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════
// REFS
// ════════════════════════════════════════════════════════════════
const heroText = document.getElementById('hero-text');
const heroBtn  = document.getElementById('hero-btn');
const lbl      = document.getElementById('stage-label');

const G = {
  hoodie:   document.getElementById('G-hoodie'),
  dims:     document.getElementById('hs-dims'),
  patterns: document.getElementById('G-patterns'),
  manne:    document.getElementById('G-manne'),
  spec:     document.getElementById('G-spec'),
  files:    document.getElementById('G-files'),
  env:      document.getElementById('f-env'),
};

// ════════════════════════════════════════════════════════════════
// SETUP: stroke-dasharray for draw-on effect
// ════════════════════════════════════════════════════════════════
function initDash(group) {
  group.querySelectorAll('.L, .Ld, .Lx').forEach(el => {
    try {
      const len = el.getTotalLength ? el.getTotalLength() : 400;
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
    } catch(e) {}
  });
}
[G.hoodie, G.patterns, G.manne, G.spec].forEach(initDash);

function resetDash(group) {
  group.querySelectorAll('.L, .Ld, .Lx').forEach(el => {
    try { el.style.strokeDashoffset = el.style.strokeDasharray; } catch(e) {}
  });
}

// ════════════════════════════════════════════════════════════════
// HARD RESET
// ════════════════════════════════════════════════════════════════
let tl = null;

function hardReset() {
  if (tl) { tl.kill(); tl = null; }
  gsap.set(heroText, { x:0, y:0, scale:1, opacity:1 });
  gsap.set(heroBtn,  { x:0, y:0 });
  Object.values(G).forEach(el => el && gsap.set(el, { opacity:0 }));
  gsap.set(G.manne, { x:0 });
  gsap.set('#f-pdf,#f-xls,#f-img', { x:0, y:0, opacity:1 });
  [G.hoodie, G.patterns, G.manne, G.spec].forEach(resetDash);
  lbl.textContent = 'готово к запуску';
}

// ════════════════════════════════════════════════════════════════
// ANIMATION
// ════════════════════════════════════════════════════════════════
function run() {
  hardReset();

  // We'll only set transformOrigin for mannequin rotation
  gsap.set(G.manne, { transformOrigin: '600px 345px' });

  tl = gsap.timeline({ defaults: { ease: 'power2.inOut' } });

  // ── Phase 0: pause before start ──────────────────────────────
  tl.addLabel('go', 0.5);

  // ── Phase 1: text shifts → button drops ──────────────────────
  tl.add(() => lbl.textContent = '1 · компоновка', 'go')
  .to(heroText, { x:'26vw', y:'-14vh', scale:.72, opacity:.52, duration:.9 }, 'go')
  .to(heroBtn,  { x:'40vw', y:'22vh', duration:.9 }, 'go');

  // ── Phase 2: hoodie draws ─────────────────────────────────────
  tl.addLabel('h', '+=.25')
  .add(() => lbl.textContent = '2 · технический эскиз', 'h')
  .to(G.hoodie, { opacity:1, duration:.15 }, 'h')
  .to(G.hoodie.querySelectorAll('.L'), {
    strokeDashoffset:0, duration:.75, stagger:.18, ease:'power1.inOut'
  }, 'h+=.1')
  .to(G.hoodie.querySelectorAll('.Ld'), {
    strokeDashoffset:0, duration:.5, stagger:.09, ease:'power1.inOut'
  }, 'h+=.55')
  .to(G.hoodie.querySelectorAll('.Lx'), {
    strokeDashoffset:0, duration:.55, stagger:.1, ease:'power1.inOut'
  }, 'h+=.9')
  .to(G.dims, { opacity:1, duration:.6 }, 'h+=1.5');

  // ── Phase 3: hoodie → pattern pieces ─────────────────────────
  tl.addLabel('p', '+=.9')
  .add(() => lbl.textContent = '3 · расстановка лекал', 'p')
  .to(G.hoodie, { opacity:0, duration:.4, ease:'power2.in' }, 'p')
  .to(G.patterns, { opacity:1, duration:.2 }, 'p+=.35')
  .to(G.patterns.querySelectorAll('.L'), {
    strokeDashoffset:0, duration:.65, stagger:.11, ease:'power1.inOut'
  }, 'p+=.45')
  .to(G.patterns.querySelectorAll('.Ld,.Lx'), {
    strokeDashoffset:0, duration:.45, stagger:.06, ease:'none'
  }, 'p+=.85');

  // ── Phase 4: patterns → mannequin ────────────────────────────
  tl.addLabel('m', '+=1.1')
  .add(() => lbl.textContent = '4 · сборка изделия', 'm')
  .to(G.patterns, { opacity:0, duration:.5, ease:'power2.in' }, 'm')
  .to(G.manne,    { opacity:1, duration:.2 }, 'm+=.45')
  .to(G.manne.querySelectorAll('.L'), {
    strokeDashoffset:0, duration:.75, stagger:.1, ease:'power1.inOut'
  }, 'm+=.55')
  .to(G.manne.querySelectorAll('.Ld'), {
    strokeDashoffset:0, duration:.5, stagger:.05, ease:'none'
  }, 'm+=.8');

  // ── Phase 5: mannequin rotates (back → front) ─────────────────
  tl.addLabel('r', '+=.9')
  .add(() => lbl.textContent = '5 · просмотр со спины', 'r')
  .to(G.manne, { scaleX:.08, duration:.35, ease:'power2.in' }, 'r')
  .to(G.manne, { scaleX:-1,  duration:.35, ease:'power2.out' }, 'r+=.35')
  .to(G.manne, { scaleX:-1,  duration:.5 }, 'r+=.7')  // hold back
  .to(G.manne, { scaleX:.08, duration:.35, ease:'power2.in' }, 'r+=1.2')
  .to(G.manne, { scaleX:1,   duration:.35, ease:'power2.out' }, 'r+=1.55');

  // ── Phase 6: mannequin left + spec table draws ────────────────
  tl.addLabel('s', '+=.45')
  .add(() => lbl.textContent = '6 · спецификация', 's')
  .to(G.manne, { x:-215, duration:.65 }, 's')
  .to(G.spec,  { opacity:1, duration:.2 }, 's+=.55')
  .to(G.spec.querySelectorAll('.L'), {
    strokeDashoffset:0, duration:.55, stagger:.04, ease:'power1.inOut'
  }, 's+=.65')
  .to(G.spec.querySelectorAll('.Ld'), {
    strokeDashoffset:0, duration:.4, stagger:.02, ease:'none'
  }, 's+=.9');

  // ── Phase 7: files appear ─────────────────────────────────────
  tl.addLabel('f', '+=1.0')
  .add(() => lbl.textContent = '7 · формирование пакета', 'f')
  .to([G.manne, G.spec], { opacity:0, duration:.5, ease:'power2.in' }, 'f')
  .to(G.files, { opacity:1, duration:.25 }, 'f+=.45')
  .to('#f-pdf', { y:-28, duration:.4, ease:'back.out(1.5)' }, 'f+=.55')
  .to('#f-xls', { y:-28, duration:.4, ease:'back.out(1.5)' }, 'f+=.68')
  .to('#f-img', { y:-28, duration:.4, ease:'back.out(1.5)' }, 'f+=.81');

  // ── Phase 8: envelope forms, files fly in ────────────────────
  tl.addLabel('e', '+=.9')
  .add(() => lbl.textContent = '8 · отправка клиенту', 'e')
  .to(G.env, { opacity:1, duration:.5 }, 'e')
  .to(['#f-pdf','#f-xls','#f-img'], {
    x:100, y:40, opacity:0, duration:.55, stagger:.1, ease:'power2.in'
  }, 'e+=.5');

  // ── Phase 9: all fades, text returns ─────────────────────────
  tl.addLabel('back', '+=.8')
  .add(() => lbl.textContent = '9 · сброс', 'back')
  .to(G.files,   { opacity:0, duration:.45 }, 'back')
  .to(heroText,  { x:0, y:0, scale:1, opacity:1, duration:.75, ease:'power2.out' }, 'back+=.3')
  .to(heroBtn,   { x:0, y:0, duration:.75, ease:'power2.out' }, 'back+=.3')
  .add(() => { lbl.textContent = '↺ нажмите «Повтор»'; tl = null; });
}

// ════════════════════════════════════════════════════════════════
// SCROLL / TOUCH INTERRUPT
// ════════════════════════════════════════════════════════════════
function interrupt() {
  if (!tl || !tl.isActive()) return;
  tl.kill(); tl = null;
  gsap.to(heroText, { x:0, y:0, scale:1, opacity:1, duration:.45, ease:'power2.out' });
  gsap.to(heroBtn,  { x:0, y:0, duration:.45, ease:'power2.out' });
  Object.values(G).forEach(el => el && gsap.to(el, { opacity:0, duration:.3 }));
  lbl.textContent = '↺ нажмите «Повтор»';
}

window.addEventListener('wheel',      interrupt, { passive:true });
window.addEventListener('touchstart', interrupt, { passive:true });

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
document.getElementById('replay-btn').addEventListener('click', run);

window.addEventListener('load', () => {
  hardReset();
  setTimeout(run, 700);
});
</script>
